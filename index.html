<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: only light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
      }

      .palette {
        display: grid;
        grid-template-columns: repeat(12, minmax(0, 1fr));
        gap: 8px;
        padding: 8px;
        width: 100%;
        contain: content;
      }

      .swatch {
        appearance: none;
        margin: 0;
        padding: 0;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 8px;
        cursor: pointer;
        background: var(--c);
        border: solid 1.5px rgb(0 0 0 / 50%);
        outline: none;
        transition: transform 120ms ease;
      }

      .top-swatch {
        grid-column: span 2;
      }

      .swatch:focus-visible {
        box-shadow: 0 0 0 3px #ffffff, 0 0 0 5px #3b82f6;
      }

      @media (hover: hover) {
        .swatch:hover {
          transform: scale(1.18);
        }
      }

      .swatch:active,
      .swatch:focus-visible {
        transform: scale(1.18);
      }

      @media (max-width: 900px) {
        .palette {
          grid-template-columns: repeat(6, minmax(0, 1fr));
        }

        .top-swatch {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="palette" id="palette"></div>

    <script>
      const topColors = ['#FFFFFF', '#FF3B30', '#FFD60A', '#0A84FF', '#34C759', '#FF2D95'];

      const families = [
        // BLANCOS POPULARES
        ['#FFFFFF', '#F8FAFC', '#F1F5F9', '#F9FAFB', '#FAF9F6', '#FFF8E7', '#FDF6EC', '#F5F5F5', '#F0F8FF', '#FFF0F5', '#F8F4FF', '#F7FEE7'],
        // ROJOS
        ['#FF6B6B', '#FF4D4D', '#FF7A59', '#FF5C8A', '#FF3B30', '#FF385C', '#FF7F50', '#FF8F70', '#FFA07A', '#FFB3BA', '#FFC1CC', '#FFD1DC'],
        // AMARILLOS
        ['#FFD60A', '#FFE45E', '#FFDE59', '#FFE066', '#FFD43B', '#FACC15', '#FDE047', '#F9E2AE', '#FFE8A3', '#FFF3BF', '#FEF3C7', '#FEF9C3'],
        // AZULES
        ['#0A84FF', '#3B82F6', '#38BDF8', '#22D3EE', '#60A5FA', '#67E8F9', '#7DD3FC', '#93C5FD', '#A5F3FC', '#BFDBFE', '#DBEAFE', '#E0F2FE'],
        // VERDES
        ['#34C759', '#22C55E', '#10B981', '#2DD4BF', '#4ADE80', '#6EE7B7', '#86EFAC', '#A7F3D0', '#BBF7D0', '#D9F99D', '#DCFCE7', '#ECFCCB'],
        // MAGENTAS
        ['#FF2D95', '#EC4899', '#D946EF', '#F472B6', '#E879F9', '#F9A8D4', '#F5D0FE', '#FBCFE8', '#FAE8FF', '#FCE7F3', '#E9D5FF', '#F3E8FF']
      ];

      const palette = document.getElementById('palette');

      for (const color of topColors) {
        const button = document.createElement('button');
        button.className = 'swatch top-swatch';
        button.style.setProperty('--c', color);
        button.dataset.color = color;
        button.setAttribute('aria-label', color);
        palette.appendChild(button);
      }

      const rows = Math.max(...families.map((family) => family.length / 2));

      for (let row = 0; row < rows; row += 1) {
        for (const family of families) {
          const first = family[row * 2];
          const second = family[row * 2 + 1];

          if (first) {
            const button = document.createElement('button');
            button.className = 'swatch';
            button.style.setProperty('--c', first);
            button.dataset.color = first;
            button.setAttribute('aria-label', first);
            palette.appendChild(button);
          }

          if (second) {
            const button = document.createElement('button');
            button.className = 'swatch';
            button.style.setProperty('--c', second);
            button.dataset.color = second;
            button.setAttribute('aria-label', second);
            palette.appendChild(button);
          }
        }
      }

      palette.addEventListener('click', (event) => {
        const target = event.target.closest('.swatch');
        if (!target) return;

        const selected = target.dataset.color;
        target.dispatchEvent(
          new CustomEvent('color-selected', {
            bubbles: true,
            detail: { color: selected }
          })
        );

        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(selected).catch(() => {});
        }
      });
    </script>
  </body>
</html>
