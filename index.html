<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      :root {
        color-scheme: only light;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #ffffff;
      }

      .palette {
        --columns: 5;
        display: grid;
        grid-template-columns: repeat(var(--columns), 56px);
        gap: 8px;
        padding: 8px;
        width: max-content;
        margin: 0 auto;
        contain: content;
      }

      .swatch {
        appearance: none;
        margin: 0;
        padding: 0;
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 8px;
        cursor: pointer;
        background: var(--c);
        border: solid 1.5px rgb(0 0 0 / 50%);
        outline: none;
        transition: transform 120ms ease;
      }

      .top-swatch {
        border-width: 2px;
      }

      .bottom-white {
        grid-column: 1 / -1;
        width: 100%;
        aspect-ratio: auto;
        height: 56px;
      }

      .swatch:focus-visible {
        box-shadow: 0 0 0 3px #ffffff, 0 0 0 5px #3b82f6;
      }

      @media (hover: hover) {
        .swatch:hover {
          transform: scale(1.18);
        }

        .bottom-white:hover {
          transform: scale(1.01);
        }
      }

      .swatch:active,
      .swatch:focus-visible {
        transform: scale(1.18);
      }

      .bottom-white:active,
      .bottom-white:focus-visible {
        transform: scale(1.01);
      }
    </style>
  </head>
  <body>
    <div class="palette" id="palette"></div>

    <script>
      const colorColumns = [
        {
          header: '#FF3B30', // ROJO
          shades: ['#7F1D1D', '#B91C1C', '#DC2626', '#EF4444', '#F87171', '#FCA5A5', '#FEE2E2']
        },
        {
          header: '#F97316', // NARANJA (ROJO + AMARILLO)
          shades: ['#7C2D12', '#9A3412', '#C2410C', '#EA580C', '#F97316', '#FDBA74', '#FFEDD5']
        },
        {
          header: '#FFD60A', // AMARILLO
          shades: ['#713F12', '#854D0E', '#A16207', '#CA8A04', '#EAB308', '#FACC15', '#FEF9C3']
        },
        {
          header: '#84CC16', // LIMA (AMARILLO + AZUL)
          shades: ['#365314', '#4D7C0F', '#65A30D', '#84CC16', '#A3E635', '#BEF264', '#ECFCCB']
        },
        {
          header: '#0A84FF', // AZUL
          shades: ['#172554', '#1D4ED8', '#2563EB', '#3B82F6', '#60A5FA', '#93C5FD', '#DBEAFE']
        },
        {
          header: '#06B6D4', // CIAN (AZUL + VERDE)
          shades: ['#164E63', '#155E75', '#0E7490', '#0891B2', '#06B6D4', '#67E8F9', '#CFFAFE']
        },
        {
          header: '#34C759', // VERDE
          shades: ['#14532D', '#166534', '#15803D', '#16A34A', '#22C55E', '#86EFAC', '#DCFCE7']
        },
        {
          header: '#9A7A77', // MEZCLA VERDE + MAGENTA
          shades: ['#4A2E2B', '#66403D', '#805553', '#9A7A77', '#B99A97', '#D5BCB8', '#EFE2DE']
        },
        {
          header: '#FF2D95', // MAGENTA
          shades: ['#831843', '#9D174D', '#BE185D', '#DB2777', '#EC4899', '#F9A8D4', '#FCE7F3']
        }
      ];

      const palette = document.getElementById('palette');
      palette.style.setProperty('--columns', String(colorColumns.length));

      for (const group of colorColumns) {
        const button = document.createElement('button');
        button.className = 'swatch top-swatch';
        button.style.setProperty('--c', group.header);
        button.dataset.color = group.header;
        button.setAttribute('aria-label', group.header);
        palette.appendChild(button);
      }

      const maxRows = Math.max(...colorColumns.map((group) => group.shades.length));
      for (let row = 0; row < maxRows; row += 1) {
        for (const group of colorColumns) {
          const color = group.shades[row];
          if (!color) continue;

          const button = document.createElement('button');
          button.className = 'swatch';
          button.style.setProperty('--c', color);
          button.dataset.color = color;
          button.setAttribute('aria-label', color);
          palette.appendChild(button);
        }
      }

      const bottomWhite = document.createElement('button');
      bottomWhite.className = 'swatch bottom-white';
      bottomWhite.style.setProperty('--c', '#FFFFFF');
      bottomWhite.dataset.color = '#FFFFFF';
      bottomWhite.setAttribute('aria-label', '#FFFFFF');
      palette.appendChild(bottomWhite);

      palette.addEventListener('click', (event) => {
        const target = event.target.closest('.swatch');
        if (!target) return;

        const selected = target.dataset.color;
        target.dispatchEvent(
          new CustomEvent('color-selected', {
            bubbles: true,
            detail: { color: selected }
          })
        );

        if (navigator.clipboard?.writeText) {
          navigator.clipboard.writeText(selected).catch(() => {});
        }
      });
    </script>
  </body>
</html>
